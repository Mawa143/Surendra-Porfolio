<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="warm" cx="62%" cy="48%" r="70%">
      <stop offset="0%" stop-color="#FFE2B8"/>
      <stop offset="55%" stop-color="#FBEEDB"/>
      <stop offset="100%" stop-color="#FAF8F3"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#warm)"/>
  <rect width="1200" height="630" fill="none"/>

  <!-- timeline ticks footer -->
  <g opacity="0.18">
    <rect x="0" y="612" width="1200" height="2" fill="#0A0A0A"/>
  </g>
  <rect x="0" y="612" width="760" height="2" fill="#E85D04"/>
  <rect x="757" y="606" width="2" height="14" fill="#0A0A0A"/>

  <!-- label -->
  <text x="80" y="150" font-family="Helvetica, Arial, sans-serif" font-size="22" letter-spacing="6"
        font-weight="700" fill="#E85D04">PORTFOLIO · SENIOR VIDEO EDITOR</text>

  <!-- name -->
  <text x="76" y="290" font-family="Georgia, 'Times New Roman', serif" font-style="italic"
        font-size="120" fill="#0A0A0A">Surendra</text>
  <text x="80" y="400" font-family="Helvetica, Arial, sans-serif" font-size="96"
        font-weight="800" fill="#0A0A0A" letter-spacing="-2">YELISETTY</text>

  <!-- tagline -->
  <text x="82" y="470" font-family="Helvetica, Arial, sans-serif" font-size="30" fill="#2A2A2A">
    Specialized in promos, television programs, podcasts &amp; reels.
  </text>

  <!-- tools -->
  <text x="82" y="540" font-family="Helvetica, Arial, sans-serif" font-size="24" fill="#8B8680" letter-spacing="1">
    Final Cut Pro  ·  Avid  ·  Premiere Pro  ·  After Effects  ·  Photoshop
  </text>

  <!-- REC chip -->
  <g transform="translate(862,70)">
    <rect width="258" height="48" rx="24" fill="#0A0A0A"/>
    <circle cx="28" cy="24" r="7" fill="#E85D04"/>
    <text x="48" y="31" font-family="Helvetica, Arial, sans-serif" font-size="18" letter-spacing="2.5" fill="#FAF8F3">REC · 00:13:00:00</text>
  </g>

  <!-- big play mark -->
  <g transform="translate(980,300)" opacity="0.95">
    <circle cx="60" cy="60" r="92" fill="none" stroke="#0A0A0A" stroke-opacity="0.12" stroke-width="2"/>
    <circle cx="60" cy="60" r="64" fill="#0A0A0A"/>
    <polygon points="46,32 92,60 46,88" fill="#E85D04"/>
  </g>
</svg>
